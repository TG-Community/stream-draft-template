name: "Archive Published Versions"

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Refresh archive manifest
        run: npm run archive

      - name: Upload archive manifest
        uses: actions/upload-artifact@v4
        with:
          name: archive
          path: archive.json
